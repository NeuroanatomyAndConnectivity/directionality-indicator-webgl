<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Directionality Indicator</title>
    <style>
      :root {
        --bg: #0d0d0f;
        --panel-bg: rgba(18, 18, 21, 0.94);
        --panel-bg-solid: #121215;
        --panel-border: rgba(255, 255, 255, 0.06);
        --panel-divider: rgba(255, 255, 255, 0.05);
        --text: #e8e8ea;
        --text-dim: #9a9aa3;
        --text-mute: #6a6a73;
        --accent: #7aa2ff;
        --accent-soft: rgba(122, 162, 255, 0.18);
        --row-hover: rgba(255, 255, 255, 0.03);
        --control-bg: rgba(255, 255, 255, 0.04);
        --control-border: rgba(255, 255, 255, 0.08);
        --control-border-hover: rgba(255, 255, 255, 0.16);
        --danger: #ff7a7a;
        --ok: #7ad19a;
      }

      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 13px; -webkit-font-smoothing: antialiased; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #banner { position: fixed; top: 0; left: 0; right: 0; padding: 12px; background: #c33; color: #fff; display: none; }

      /* Side-panel UI */
      #panel-root {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        z-index: 10;
        display: flex;
        align-items: stretch;
        pointer-events: none; /* children re-enable */
      }
      #panel {
        width: 280px;
        background: var(--panel-bg);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        border-left: 1px solid var(--panel-border);
        padding: 18px 18px 24px;
        overflow-y: auto;
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.12) transparent;
      }
      #panel::-webkit-scrollbar { width: 8px; }
      #panel::-webkit-scrollbar-track { background: transparent; }
      #panel::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      #panel::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.18); background-clip: padding-box; border: 2px solid transparent; }
      #panel.closed { transform: translateX(100%); }

      /* Panel header (title + collapse button) */
      #panel-titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: -18px -18px 4px;
        padding: 10px 12px 10px 18px;
        position: sticky;
        top: -18px;
        z-index: 1;
        background: rgba(14, 14, 17, 0.85);
        backdrop-filter: blur(8px) saturate(140%);
        -webkit-backdrop-filter: blur(8px) saturate(140%);
        border-bottom: 1px solid var(--panel-divider);
      }
      #panel-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }
      #panel-collapse-btn {
        width: 26px;
        height: 26px;
        background: transparent;
        border: 1px solid var(--control-border);
        border-radius: 6px;
        color: var(--text-dim);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }
      #panel-collapse-btn:hover {
        background: var(--accent-soft);
        border-color: var(--control-border-hover);
        color: var(--text);
      }
      #panel-collapse-btn:focus-visible {
        outline: 1px solid var(--accent);
        outline-offset: 2px;
      }

      #panel-toggle {
        position: absolute;
        right: 280px;
        top: 50%;
        transform: translateY(-50%);
        width: 22px;
        height: 60px;
        background: var(--panel-bg);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        border: 1px solid var(--panel-border);
        border-right: none;
        border-radius: 8px 0 0 8px;
        color: var(--text-dim);
        cursor: pointer;
        pointer-events: auto;
        transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.15s, color 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-size: 0; /* hide any text content; we use SVG */
      }
      #panel-toggle svg { display: block; transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
      #panel-toggle.closed {
        right: 12px;
        top: 12px;
        transform: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border-right: 1px solid var(--panel-border);
        background: rgba(20, 20, 24, 0.96);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--panel-border);
        color: var(--text);
      }
      #panel-toggle.closed:hover {
        background: rgba(36, 36, 40, 1);
        transform: scale(1.05);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45), 0 0 0 1px var(--accent-soft);
      }
      #panel-toggle.closed svg { transform: rotate(180deg); }
      #panel-toggle:hover { color: var(--text); background: rgba(30, 30, 34, 0.96); }

      /* Section headings — clickable for collapse */
      .panel-section { margin: 0; }
      .panel-section + .panel-section { margin-top: 4px; }
      .panel-heading {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 14px 0 6px;
        padding: 6px 4px 8px;
        border-bottom: 1px solid var(--panel-divider);
        font-size: 10.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        cursor: pointer;
        user-select: none;
        background: transparent;
        border-top: none;
        border-left: none;
        border-right: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
        transition: color 0.12s ease;
      }
      .panel-heading:hover { color: var(--text); }
      .panel-heading:first-child { margin-top: 0; }
      .panel-heading:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
      .panel-heading-caret {
        display: inline-block;
        width: 10px;
        font-size: 10px;
        color: var(--text-mute);
        line-height: 1;
        transition: transform 0.18s ease, color 0.12s ease;
      }
      .panel-heading:hover .panel-heading-caret { color: var(--text-dim); }
      .panel-heading-title { flex: 1; }

      .panel-section-body {
        overflow: hidden;
        display: grid;
        grid-template-rows: 1fr;
        transition: grid-template-rows 0.2s ease;
      }
      .panel-section-body > .panel-section-inner {
        min-height: 0;
        padding: 4px 0 8px;
      }
      .panel-section.collapsed .panel-section-body { grid-template-rows: 0fr; }
      .panel-section.collapsed .panel-section-body > .panel-section-inner { padding-top: 0; padding-bottom: 0; }

      .panel-control { margin: 8px 0; }
      .panel-control:first-child { margin-top: 2px; }

      .panel-label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        font-size: 12px;
        color: var(--text);
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .panel-label-text { flex: 1; min-width: 0; }
      .panel-value {
        color: var(--text-mute);
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        font-feature-settings: "tnum";
      }
      /* Editable value: input styled to read like a label until hovered/focused */
      .panel-value-input {
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-mute);
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum";
        font-size: 11px;
        font-family: inherit;
        width: 5em;
        text-align: right;
        padding: 1px 5px;
        border-radius: 3px;
        cursor: text;
        outline: none;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }
      .panel-value-input:hover {
        background: var(--control-bg);
        border-color: var(--control-border);
        color: var(--text-dim);
      }
      .panel-value-input:focus {
        background: var(--control-bg);
        border-color: var(--accent);
        color: var(--text);
      }
      /* Hide spinner buttons (we use type=text but defensively) */
      .panel-value-input::-webkit-outer-spin-button,
      .panel-value-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

      /* Range sliders */
      .panel-control input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
        height: 18px;
        margin: 0;
      }
      .panel-control input[type="range"]:hover { accent-color: #9bbcff; }

      /* Inline checkbox row — checkbox + label on one line */
      .panel-control.checkbox-row {
        display: flex;
        align-items: center;
        gap: 9px;
        margin: 4px -4px;
        padding: 5px 6px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.1s ease;
      }
      .panel-control.checkbox-row:hover { background: var(--row-hover); }
      .panel-control.checkbox-row .panel-label {
        margin: 0;
        flex: 1;
        cursor: pointer;
      }
      .panel-control input[type="checkbox"] {
        accent-color: var(--accent);
        width: 14px;
        height: 14px;
        margin: 0;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* Color picker — flatter, modern */
      .panel-control input[type="color"] {
        width: 100%;
        height: 26px;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 5px;
        cursor: pointer;
        padding: 2px;
        transition: border-color 0.12s ease;
      }
      .panel-control input[type="color"]:hover { border-color: var(--control-border-hover); }
      .panel-control input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
      .panel-control input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

      .panel-note {
        font-size: 10.5px;
        color: var(--text-mute);
        margin-top: 4px;
        font-style: normal;
        opacity: 0.85;
      }

      /* Reset button */
      /* 3x2 grid of canonical-view buttons */
      .panel-view-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
        margin: 4px 0;
      }
      .panel-view-btn {
        padding: 6px 4px;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 5px;
        color: var(--text-dim);
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }
      .panel-view-btn:hover {
        background: var(--accent-soft);
        border-color: var(--control-border-hover);
        color: var(--text);
      }

      .panel-btn {
        width: 100%;
        padding: 7px 10px;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 5px;
        color: var(--text);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      .panel-btn:hover { background: var(--accent-soft); border-color: var(--control-border-hover); }
      .panel-btn:disabled { opacity: 0.5; cursor: progress; }
      .panel-btn .icon { font-size: 14px; }

      #panel-reset {
        width: 100%;
        padding: 9px 12px;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 6px;
        color: var(--text-dim);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
      }
      #panel-reset:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--text);
      }
      #panel-reset .icon { font-size: 13px; line-height: 1; }

      /* Custom file input — hide native, style label as button */
      .panel-file-row { display: flex; gap: 6px; margin-top: 6px; }
      .panel-file-input { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
      .panel-file-label {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 7px 10px;
        background: var(--control-bg);
        border: 1px solid var(--control-border);
        border-radius: 5px;
        color: var(--text);
        font-size: 11.5px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        user-select: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .panel-file-label:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
      }
      .panel-file-label:focus-within { border-color: var(--accent); }
      .panel-file-label .icon { font-size: 12px; opacity: 0.85; }
      .panel-select {
        width: 100%;
        margin-top: 4px;
        padding: 6px 8px;
        background: var(--control-bg);
        color: var(--text);
        border: 1px solid var(--control-border);
        border-radius: 5px;
        font-size: 11.5px;
        cursor: pointer;
        transition: border-color 0.12s;
      }
      .panel-select:hover { border-color: var(--accent); }
      .panel-select:focus { outline: none; border-color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
